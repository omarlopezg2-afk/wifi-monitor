name: Build Multiplataforma

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: 🐧 Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias y compilar
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2
          pip install pyinstaller pandas openpyxl streamlit fastapi uvicorn
          chmod +x build_appimage.sh
          python build_all.py --linux

      - name: Subir Artifact
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: 🪟 Windows Installer
    runs-on: windows-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias y compilar
        run: |
          pip install pyinstaller pandas openpyxl streamlit fastapi uvicorn
          choco install innosetup
          python build_all.py --windows

      - name: Subir Artifact
        uses: softprops/action-gh-release@v2
        with:
          files: installer_output/WiFiMonitor-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    name: 🍎 macOS DMG
    runs-on: macos-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias y compilar
        run: |
          pip install pyinstaller pandas openpyxl streamlit fastapi uvicorn
          chmod +x build_mac.sh
          python build_all.py --mac

      - name: Subir Artifact
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
