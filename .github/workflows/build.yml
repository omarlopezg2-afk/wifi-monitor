# .github/workflows/build.yml
# ─────────────────────────────────────────────────────────────────
#  CI/CD — WiFi Monitor Builds Multiplataforma
#
#  Genera los tres paquetes en paralelo al hacer un tag vX.X:
#    Linux   → WiFiMonitor-x.x-x86_64.AppImage
#    Windows → WiFiMonitor-Setup.exe (firmado con certificado de código)
#    macOS   → WiFiMonitor-x.x-macOS.dmg
#
#  Los adjunta automáticamente al Release de GitHub.
# ─────────────────────────────────────────────────────────────────

name: Build Multiplataforma

on:
  push:
    tags:
      - "v*"          # Dispara al crear un tag como v2.0, v2.1, etc.
  workflow_dispatch:  # Permite disparar manualmente desde la UI

jobs:

  # ─────────────────────────────────────────────
  #  LINUX — AppImage
  # ─────────────────────────────────────────────
  build-linux:
    name: 🐧 Linux AppImage
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libfuse2 patchelf wireless-tools \
            iproute2 net-tools arp-scan nmap iputils-ping libnotify-bin

      - name: Instalar dependencias Python
        run: |
          pip install --upgrade pyinstaller streamlit plotly pandas psutil speedtest-cli

      - name: Compilar con PyInstaller
        run: |
          pyinstaller \
            --noconfirm --onedir --windowed \
            --name WiFiMonitor \
            --add-data "wifi_monitor.py:." \
            --hidden-import streamlit \
            --hidden-import streamlit.web.cli \
            --hidden-import streamlit.runtime.scriptrunner \
            --hidden-import altair \
            --collect-all streamlit \
            --collect-all altair \
            launcher.py

      - name: Descargar appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Construir AppDir y empaquetar
        run: |
          bash build_appimage.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: WiFiMonitor-*.AppImage

  # ─────────────────────────────────────────────
  #  WINDOWS — Instalador .exe (firmado)
  # ─────────────────────────────────────────────
  build-windows:
    name: 🪟 Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias Python
        run: |
          pip install --upgrade pyinstaller streamlit plotly pandas psutil speedtest-cli

      - name: Compilar bundle PyInstaller
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: python build_windows_prep.py

      - name: Instalar Inno Setup
        run: |
          choco install innosetup --no-progress -y

      - name: Compilar instalador
        run: |
          iscc WiFiMonitor-Setup.iss

      # ── Firma de código ────────────────────────────────────
      # El certificado .pfx viaja como secret en base64 y se
      # reconstruye aquí en disco solo durante el job; se borra
      # al final aunque falle un paso anterior.
      - name: Reconstruir certificado .pfx desde el secret
        shell: pwsh
        env:
          BASE64_CERTIFICATE: ${{ secrets.BASE64_CERTIFICATE }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:BASE64_CERTIFICATE)) {
            Write-Error "El secret BASE64_CERTIFICATE está vacío o no se cargó."
            exit 1
          }
          $clean = $env:BASE64_CERTIFICATE.Trim() -replace '\s', ''
          $bytes = [Convert]::FromBase64String($clean)
          $pfxPath = "$env:RUNNER_TEMP\codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, $bytes)
          $size = (Get-Item $pfxPath).Length
          Write-Host "Certificado reconstruido: $size bytes"
          if ($size -lt 100) {
            Write-Error "El .pfx reconstruido es sospechosamente pequeño ($size bytes). El secret probablemente está mal."
            exit 1
          }

      - name: Firmar el instalador con signtool
        shell: pwsh
        env:
          BASE64_CERTIFICATE_PSW: ${{ secrets.BASE64_CERTIFICATE_PSW }}
        run: |
          $pfxPath = "$env:RUNNER_TEMP\codesign.pfx"

          # Validar que la contraseña realmente abre el .pfx antes de firmar
          try {
            $cert = New-Object System.Security.Cryptography.X509Certificates.X509Certificate2(
              $pfxPath, $env:BASE64_CERTIFICATE_PSW,
              [System.Security.Cryptography.X509Certificates.X509KeyStorageFlags]::Exportable
            )
            Write-Host "✅ Certificado abierto correctamente: $($cert.Subject)"
            Write-Host "Vigencia: $($cert.NotBefore) -> $($cert.NotAfter)"
          } catch {
            Write-Error "No se pudo abrir el .pfx con la contraseña dada. Revisa el secret BASE64_CERTIFICATE_PSW. Detalle: $_"
            exit 1
          }

          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1
          Write-Host "Usando signtool: $($signtool.FullName)"

          & $signtool.FullName sign `
            /f $pfxPath `
            /p "$env:BASE64_CERTIFICATE_PSW" `
            /fd SHA256 `
            /tr http://timestamp.digicert.com `
            /td SHA256 `
            /v `
            installer_output\WiFiMonitor-Setup.exe

          if ($LASTEXITCODE -ne 0) {
            Write-Error "signtool sign devolvió código de error $LASTEXITCODE. La firma NO se aplicó."
            exit 1
          }
          Write-Host "✅ signtool sign terminó con éxito (exit code 0)"

      - name: Verificar firma
        shell: pwsh
        run: |
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1
          $pfxPath = "$env:RUNNER_TEMP\codesign.pfx"

          # Para un certificado autofirmado, la cadena nunca llegará a una
          # CA raíz que Windows reconozca por defecto (eso es esperado y
          # no indica que la firma esté mal). En vez de pelear con la
          # cadena de confianza del sistema, verificamos directamente con
          # Authenticode vía .NET: ¿el binario tiene una firma digital
          # válida y no fue alterado después de firmarse?
          Add-Type -AssemblyName System.Security
          $exePath = (Resolve-Path "installer_output\WiFiMonitor-Setup.exe").Path
          $cert = $null
          try {
            $cert = (Get-AuthenticodeSignature -FilePath $exePath)
          } catch {
            Write-Error "No se pudo leer la firma Authenticode del binario: $_"
            exit 1
          }

          Write-Host "Estado de la firma: $($cert.Status)"
          Write-Host "Firmante: $($cert.SignerCertificate.Subject)"

          if ($cert.Status -eq 'UnknownError' -or $cert.Status -eq 'NotSigned') {
            Write-Error "El binario no tiene una firma Authenticode válida (Status: $($cert.Status))."
            exit 1
          }

          if ($cert.Status -eq 'UntrustedRoot') {
            Write-Host "✅ Firma Authenticode presente y binario íntegro."
            Write-Host "ℹ️  Status 'UntrustedRoot' es esperado: el certificado es autofirmado,"
            Write-Host "    por lo que su cadena no llega a una CA raíz reconocida por Windows."
            Write-Host "    Esto NO significa que la firma esté rota."
          } elseif ($cert.Status -ne 'Valid') {
            Write-Error "Estado de firma inesperado: $($cert.Status)"
            exit 1
          } else {
            Write-Host "✅ Firma válida y confiable."
          }

      - name: Borrar certificado del disco
        if: always()
        shell: pwsh
        run: |
          Remove-Item "$env:RUNNER_TEMP\codesign.pfx" -ErrorAction SilentlyContinue

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer_output\WiFiMonitor-Setup.exe

  # ─────────────────────────────────────────────
  #  macOS — DMG
  # ─────────────────────────────────────────────
  build-mac:
    name: 🍎 macOS DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-14     # Apple Silicon
            arch: arm64
          - runner: macos-13     # Intel
            arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias Python
        run: |
          pip install --upgrade pyinstaller streamlit plotly pandas psutil speedtest-cli

      - name: Instalar create-dmg
        run: brew install create-dmg

      - name: Build DMG
        run: bash build_mac.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg-${{ matrix.arch }}
          path: WiFiMonitor-*.dmg

  # ─────────────────────────────────────────────
  #  RELEASE — Adjuntar los tres archivos
  # ─────────────────────────────────────────────
  release:
    name: 📦 Crear Release
    needs: [build-linux, build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Descargar artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Crear Release con los tres paquetes
        uses: softprops/action-gh-release@v2
        with:
          files: |
            WiFiMonitor-*.AppImage
            WiFiMonitor-Setup.exe
            WiFiMonitor-*.dmg
          body: |
            ## WiFi Monitor ${{ github.ref_name }}

            ### Descargas
            | Plataforma | Archivo | Instrucciones |
            |------------|---------|---------------|
            | 🐧 Linux   | `.AppImage` | `chmod +x WiFiMonitor*.AppImage && ./WiFiMonitor*.AppImage` |
            | 🪟 Windows | `WiFiMonitor-Setup.exe` | Doble clic → Siguiente → Instalar |
            | 🍎 macOS (Apple Silicon: M1/M2/M3/M4) | `*-macOS-arm64.dmg` | Arrastrar a Aplicaciones |
            | 🍎 macOS (Intel) | `*-macOS-x86_64.dmg` | Arrastrar a Aplicaciones |

            > **macOS**: Si Gatekeeper bloquea la app, ir a Ajustes → Privacidad y seguridad → Abrir igualmente.
